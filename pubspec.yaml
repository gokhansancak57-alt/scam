name: scam
description: "A decentralized P2P mesh messenger with Nostr fallback and Noise encryption."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Networking & Mesh
  nearby_connections: ^1.1.0
  dart_nostr: ^0.3.4
  http: ^1.1.0

  # Encryption & Security
  noise_protocol_dart: ^0.1.0
  fast_rsa: ^3.7.0
  pointycastle: ^3.7.3
  cryptography: ^2.7.0
  
  # Local Storage
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.1

  # UI & Animations
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  font_awesome_flutter: ^10.6.0
  badges: ^3.1.2
  
  # Media
  camera: ^0.10.5+5
  image_picker: ^1.0.4
  record: ^5.0.0
  audioplayers: ^5.2.1
  video_player: ^2.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/

